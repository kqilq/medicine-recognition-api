name: Generate Medicine Embeddings

on:
  push:
    paths:
      - 'dataset/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision pillow

      - name: Generate Embeddings
        run: python generate_embeddings.py

      - name: Commit and Push Updated Embeddings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update medicine_embeddings.pt via GitHub Action"
          file_pattern: "medicine_embeddings.pt"
